# Nginx configuration for ashokmagadum.com
# Place this file at /etc/nginx/sites-available/ashokmagadum.com
# Then: sudo ln -s /etc/nginx/sites-available/ashokmagadum.com /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=portfolio_limit:10m rate=20r/s;

# Upstream Next.js app
upstream nextjs_app {
    server localhost:3000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name ashokmagadum.com www.ashokmagadum.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# WWW → non-WWW redirect (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.ashokmagadum.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/ashokmagadum.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ashokmagadum.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://ashokmagadum.com$request_uri;
}

# Main server block (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ashokmagadum.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/ashokmagadum.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ashokmagadum.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; frame-ancestors 'none';" always;

    # Root and logging
    root /var/www/ashokmagadum.com/public;
    access_log /var/log/nginx/ashokmagadum.access.log;
    error_log /var/log/nginx/ashokmagadum.error.log;

    # Rate limiting
    limit_req zone=portfolio_limit burst=50 nodelay;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # Client body size
    client_max_body_size 10M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Next.js static files (_next/static) — long cache
    location /_next/static/ {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status "STATIC";
    }

    # Next.js image optimization
    location /_next/image {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "public, max-age=86400";
    }

    # Public static files (favicon, resume.pdf, images, etc.)
    location /static/ {
        alias /var/www/ashokmagadum.com/public/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
    }

    # Resume PDF
    location = /resume.pdf {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Content-Disposition "inline; filename=Ashok_Magadum_Resume.pdf";
        add_header Cache-Control "public, max-age=86400";
    }

    # Favicon
    location = /favicon.ico {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=604800";
        log_not_found off;
        access_log off;
    }

    # Robots.txt
    location = /robots.txt {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        log_not_found off;
        access_log off;
    }

    # Main proxy to Next.js
    location / {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Don't cache HTML pages (Next.js handles its own caching)
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Block common attack vectors
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
